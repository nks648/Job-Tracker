name: Job Tracker

on:
  schedule:
    # Every 2 hours during Munich business hours Mon–Fri (07:00–17:00 UTC = 08:00–18:00 CET)
    - cron: "0 7,9,11,13,15,17 * * 1-5"
    # Once on weekends (08:00 UTC)
    - cron: "0 8 * * 0,6"
  workflow_dispatch:

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore job state cache
        uses: actions/cache@v4
        with:
          path: job_state.json
          key: job-state-${{ github.run_id }}
          restore-keys: |
            job-state-

      - name: Restore jobs database
        uses: actions/cache@v4
        with:
          path: jobs_database.csv
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Run job checker
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python checker.py

      - name: Save updated job state
        if: always()
        uses: actions/cache@v4
        with:
          path: job_state.json
          key: job-state-${{ github.run_id }}

      - name: Save updated jobs database
        if: always()
        uses: actions/cache@v4
        with:
          path: jobs_database.csv
          key: jobs-db-${{ github.run_id }}

      - name: Upload database as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-database-${{ github.run_number }}
          path: jobs_database.csv
          retention-days: 90
