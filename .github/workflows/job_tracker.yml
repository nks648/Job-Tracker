name: Daily Job Tracker

on:
  schedule:
    # Runs every day at 07:00 UTC (adjust to your timezone)
    - cron: "0 7 * * *"
  workflow_dispatch:   # also allows manual trigger from GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout your repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore cached state file (seen jobs) ────────────────────────────
      - name: Restore job state cache
        uses: actions/cache@v4
        with:
          path: job_state.json
          key: job-state-${{ github.run_id }}
          restore-keys: |
            job-state-

      # ── 5. Run the checker ───────────────────────────────────────────────────
      - name: Run job checker
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python checker.py

      # ── 6. Save updated state ────────────────────────────────────────────────
      - name: Save updated job state
        uses: actions/cache@v4
        with:
          path: job_state.json
          key: job-state-${{ github.run_id }}
